name: Quality

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_IMAGEKIT_URL_ENDPOINT: https://ik.imagekit.io/loyalty

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Selector contracts
        run: npm run check:selector-contracts

      - name: Token integrity
        run: npm run check:token-integrity

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        run: npm run audit:prod

  parity-visual:
    name: parity-visual
    runs-on: ubuntu-latest
    needs: quality
    env:
      NEXT_PUBLIC_IMAGEKIT_URL_ENDPOINT: https://ik.imagekit.io/loyalty

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Run pixel parity harness
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_URL: http://localhost:3000/
          STATIC_URL: http://localhost:4100/wireframe-remy.html
        run: |
          set -euo pipefail

          python3 -m http.server 4100 >/tmp/remy-static.log 2>&1 &
          STATIC_PID=$!

          npm run start >/tmp/remy-next.log 2>&1 &
          NEXT_PID=$!

          cleanup() {
            kill "$STATIC_PID" "$NEXT_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 90); do
            if curl -fsS "http://localhost:4100/wireframe-remy.html" >/dev/null 2>&1 && curl -fsS "http://localhost:3000/" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          npm run parity:check

  parity-motion:
    name: parity-motion
    runs-on: ubuntu-latest
    needs: quality
    env:
      NEXT_PUBLIC_IMAGEKIT_URL_ENDPOINT: https://ik.imagekit.io/loyalty

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Run motion parity harness
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_URL: http://localhost:3000/
        run: |
          set -euo pipefail

          npm run start >/tmp/remy-next-motion.log 2>&1 &
          NEXT_PID=$!

          cleanup() {
            kill "$NEXT_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 90); do
            if curl -fsS "http://localhost:3000/" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          npm run parity:motion

  parity-fullpage:
    name: parity-fullpage
    runs-on: ubuntu-latest
    needs: quality
    env:
      NEXT_PUBLIC_IMAGEKIT_URL_ENDPOINT: https://ik.imagekit.io/loyalty

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Run full-page parity harness
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_URL: http://localhost:3000/
          PRODUCTION_URL: https://sendpush-prod.vercel.app/
        run: |
          set -euo pipefail

          npm run start >/tmp/remy-next-fullpage.log 2>&1 &
          NEXT_PID=$!

          cleanup() {
            kill "$NEXT_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 90); do
            if curl -fsS "http://localhost:3000/" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          npm run parity:fullpage

  parity:
    name: parity
    runs-on: ubuntu-latest
    needs:
      - parity-visual
      - parity-motion
      - parity-fullpage

    steps:
      - name: Aggregate parity checks
        run: echo "parity-visual, parity-motion, and parity-fullpage passed"
